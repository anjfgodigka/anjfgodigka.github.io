<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뭘해야함</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        body {
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: #f8fafc;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 800px; 
            width: 100%;
            text-align: center;
            background: rgba(30, 41, 59, 0.4);
            padding: 40px; 
            border-radius: 24px;
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(96, 165, 250, 0.2);
            box-sizing: border-box;
        }

        #ui-control {
            transition: opacity 0.5s ease;
            margin-bottom: 30px; 
        }

        .play-btn {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 16px 40px; 
            font-size: 1.1rem; 
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
            transition: all 0.3s ease;
        }

        .play-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(37, 99, 235, 0.6);
        }

        .message-display {
            width: 100%;
            min-height: 350px; 
            max-height: 500px; 
            overflow-y: auto; 
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: 12px;
            color: #cbd5e1;
            padding: 30px; 
            font-size: 1.2rem; 
            line-height: 2.0; 
            box-sizing: border-box;
            text-align: left;      
            white-space: pre-wrap; 
            margin-bottom: 40px;
        }

        .comment-section {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 30px;
            text-align: left;
        }

        .comment-section h3 {
            font-size: 1.2rem;
            color: #93c5fd;
            margin-bottom: 15px;
        }

        .comment-form {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .comment-input {
            flex: 1;
            background-color: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            border-radius: 8px;
            color: #fff;
            padding: 12px 16px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .comment-input:focus {
            border-color: #3b82f6;
        }

        .comment-submit {
            background-color: #1e293b;
            color: #93c5fd;
            border: 1px solid rgba(96, 165, 250, 0.3);
            padding: 0 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .comment-submit:not(:disabled):hover {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        .comment-list-wrapper {
            display: none; 
            margin-top: 20px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .comment-item {
            background-color: rgba(30, 41, 59, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .comment-author {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: bold;
        }

        .comment-delete-btn {
            background: none;
            border: none;
            color: #f43f5e;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .comment-delete-btn:hover {
            background: rgba(244, 63, 94, 0.15);
        }

        .comment-text {
            font-size: 0.95rem;
            color: #e2e8f0;
            line-height: 1.5;
        }

        .admin-toggle-wrapper {
            text-align: right;
            margin-top: 15px;
        }

        .admin-toggle-btn {
            background: none;
            border: none;
            color: #475569;
            font-size: 0.85rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .admin-toggle-btn:hover {
            color: #93c5fd;
        }

        /* 스크롤바 디자인 */
        .message-display::-webkit-scrollbar,
        .comment-list::-webkit-scrollbar {
            width: 6px;
        }
        .message-display::-webkit-scrollbar-thumb,
        .comment-list::-webkit-scrollbar-thumb {
            background-color: #3b82f6;
            border-radius: 4px;
        }

        .hidden-player {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="ui-control">
            <button id="start-bgm" class="play-btn">🎵노래 재생</button>
        </div>

        <div class="message-display">우선 이 폐이지를 만든 이유는 제가 전하고자 하는 말을 직접 하기 보다는
        이 폐이지를 통해서 전하는게 좀 더 나을 것이라고 생각하였고 이 폐이지까지
        온 것은 결국 0000하지 않을까 감히 예상해 봅니다.
        아무튼 이 폐이지 까지 와주셔서 감사하고 본론으로 넘어가겠습니다.
        
        
        
        
        안녕하세요, 저는........ 저에요. 네, 뭐라해야할지 모르겠습니다.
        
        
        해당 글을 읽고 뭐 그냥 하실 말이나 해주실 말이 있으시면 남겨주세요ㅎㅎ...
        관리자만 읽을 수 있으니 걱정 마시고요.</div>

        <div class="comment-section">
            <h3>익명 댓글</h3>
            <div class="comment-form">
                <input type="text" id="comment-text" class="comment-input" placeholder="한마디..." maxlength="200">
                <button id="submit-btn" class="comment-submit">등록</button>
            </div>
            
            <div id="admin-list-wrapper" class="comment-list-wrapper">
                <h4 style="color: #f43f5e; margin-bottom: 10px;">🔒 관리자 뷰어 활성화됨</h4>
                <div id="comment-list" class="comment-list"></div>
            </div>

            <div class="admin-toggle-wrapper">
                <button id="admin-login-btn" class="admin-toggle-btn">🔒 관리자 모드</button>
                <button id="admin-logout-btn" class="admin-toggle-btn" style="display: none; color: #f43f5e;">🔓 로그아웃</button>
            </div>
        </div>
    </div>

    <div id="yt-player" class="hidden-player"></div>

    <script>
        // 1. 유튜브 설정 
        var kannaVideoId = 'ajDAmJYPQ-U'; 
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                videoId: kannaVideoId,
                playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': kannaVideoId },
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady(event) {
            document.getElementById('start-bgm').addEventListener('click', function() {
                player.unMute();
                player.playVideo();
                var ui = document.getElementById('ui-control');
                ui.style.opacity = '0';
                setTimeout(function() { ui.style.display = 'none'; }, 500); 
            });
        }

        // 2. 파이어베이스 설정
        const firebaseConfig = {
            apiKey: "AIzaSyBKmo57nKqIpRQvoPOUFtYHXZE2IpcHzbY",
            authDomain: "website-32a82.firebaseapp.com",
            databaseURL: "https://website-32a82-default-rtdb.firebaseio.com",
            projectId: "website-32a82",
            storageBucket: "website-32a82.firebasestorage.app",
            messagingSenderId: "51412253738",
            appId: "1:51412253738:web:018218156cc35b11869753",
            measurementId: "G-M6ND09X25Q"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth(); 

        // 3. 로그인 상태 실시간 감지
        auth.onAuthStateChanged(function(user) {
            if (user) {
                // 로그인 되어있다면 UI를 바로 관리자 모드로 변경
                document.getElementById('admin-list-wrapper').style.display = 'block';
                document.getElementById('admin-login-btn').style.display = 'none';
                document.getElementById('admin-logout-btn').style.display = 'inline-block';
                
                // 데이터 중복 로드를 막기 위해 리스트 초기화 후 새로 불러오기
                document.getElementById('comment-list').innerHTML = ''; 
                loadCommentsRealtime();
            } else {
                // 로그아웃 상태라면 관리자 모드 숨기기
                document.getElementById('admin-list-wrapper').style.display = 'none';
                document.getElementById('admin-login-btn').style.display = 'inline-block';
                document.getElementById('admin-logout-btn').style.display = 'none';
                document.getElementById('comment-list').innerHTML = ''; 
            }
        });

        // 4. 관리자 로그인 & 로그아웃 기능
        document.getElementById('admin-login-btn').addEventListener('click', function() {
            var email = prompt("관리자 이메일을 입력하세요:");
            if (!email) return;
            var password = prompt("관리자 비밀번호를 입력하세요:");
            if (!password) return;

            auth.signInWithEmailAndPassword(email, password)
            .then(function() {
                alert("인증 성공!");
                // UI 변경은 onAuthStateChanged가 자동으로 처리해줍니다.
            })
            .catch(function(error) {
                alert("로그인 실패: 이메일 또는 비밀번호가 올바르지 않습니다.");
            });
        });

        document.getElementById('admin-logout-btn').addEventListener('click', function() {
            if (confirm("관리자 모드에서 로그아웃 하시겠습니까?")) {
                auth.signOut().then(function() {
                    alert("안전하게 로그아웃 되었습니다.");
                });
            }
        });

        // 5. 실시간 데이터 로드
        function loadCommentsRealtime() {
            database.ref('comments').orderByChild('timestamp').on('child_added', function(snapshot) {
                const commentId = snapshot.key;
                const data = snapshot.val();
                
                var newComment = document.createElement('div');
                newComment.className = 'comment-item';
                newComment.id = 'comment-' + commentId; 
                
                const date = new Date(data.timestamp).toLocaleString('ko-KR', { hour12: true, month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });
                const safeText = data.text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

                newComment.innerHTML = `
                    <div class="comment-header">
                        <div class="comment-author">익명의 방문자 · ${date}</div>
                        <button class="comment-delete-btn" onclick="deleteComment('${commentId}')">❌ 삭제</button>
                    </div>
                    <div class="comment-text">${safeText}</div>
                `;
                
                var list = document.getElementById('comment-list');
                list.insertBefore(newComment, list.firstChild); 
            });

            database.ref('comments').on('child_removed', function(snapshot) {
                const commentId = snapshot.key;
                const targetElement = document.getElementById('comment-' + commentId);
                if (targetElement) {
                    targetElement.remove();
                }
            });
        }

        // 6. 댓글 삭제
        function deleteComment(commentId) {
            if (!auth.currentUser) {
                alert("권한이 없습니다.");
                return;
            }
            if (confirm("이 댓글을 영구 삭제하시겠습니까?")) {
                database.ref('comments').child(commentId).remove()
                .catch(function(error) { alert("삭제 실패: " + error.message); });
            }
        }

        // 7. 엔터키 & 버튼 전송 로직
        function submitComment() {
            var input = document.getElementById('comment-text');
            var button = document.getElementById('submit-btn');
            var text = input.value.trim();
            
            if(text === "") {
                alert("내용을 입력해주세요.");
                return;
            }

            database.ref('comments').push({
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }, function(error) {
                if (error) {
                    alert("전송 실패: " + error.message);
                } else {
                    input.value = ""; 
                    button.innerText = "✅ 완료";
                    button.style.backgroundColor = "#10b981"; 
                    button.style.borderColor = "#10b981";
                    button.style.color = "#ffffff";
                    button.disabled = true; 

                    setTimeout(function() {
                        button.innerText = "등록";
                        button.style.backgroundColor = "#1e293b";
                        button.style.borderColor = "rgba(96, 165, 250, 0.3)";
                        button.style.color = "#93c5fd";
                        button.disabled = false;
                    }, 1500);
                }
            });
        }

        document.getElementById('submit-btn').addEventListener('click', submitComment);

        document.getElementById('comment-text').addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault(); 
                submitComment();
            }
        });
    </script>
</body>
</html>
