<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뭘해야함</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* 칸나 테마의 딥 블루&다크 배경 */
        body {
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: #f8fafc;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* 메인 카드 컨테이너 */
        .container {
            max-width: 800px; 
            width: 100%;
            text-align: center;
            background: rgba(30, 41, 59, 0.4);
            padding: 40px; 
            border-radius: 24px;
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(96, 165, 250, 0.2);
            box-sizing: border-box;
        }

        /* 재생 버튼 컨테이너 */
        #ui-control {
            transition: opacity 0.5s ease;
            margin-bottom: 30px; 
        }

        .play-btn {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 16px 40px; 
            font-size: 1.1rem; 
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
            transition: all 0.3s ease;
        }

        .play-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(37, 99, 235, 0.6);
        }

        /* 📝 내가 적은 글을 보여주는 읽기 전용 상자 */
        .message-display {
            width: 100%;
            min-height: 350px; 
            max-height: 500px; 
            overflow-y: auto; 
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: 12px;
            color: #cbd5e1;
            padding: 30px; 
            font-size: 1.2rem; 
            line-height: 2.0; 
            box-sizing: border-box;
            text-align: left;      
            white-space: pre-wrap; 
            margin-bottom: 40px;
        }

        /* 💬 댓글 섹션 스타일 */
        .comment-section {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 30px;
            text-align: left;
        }

        .comment-section h3 {
            font-size: 1.2rem;
            color: #93c5fd;
            margin-bottom: 15px;
        }

        .comment-form {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .comment-input {
            flex: 1;
            background-color: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            border-radius: 8px;
            color: #fff;
            padding: 12px 16px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .comment-input:focus {
            border-color: #3b82f6;
        }

        .comment-submit {
            background-color: #1e293b;
            color: #93c5fd;
            border: 1px solid rgba(96, 165, 250, 0.3);
            padding: 0 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        /* 호버 효과 (비활성화 상태가 아닐 때만 작동) */
        .comment-submit:not(:disabled):hover {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        /* 댓글 리스트 */
        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .comment-item {
            background-color: rgba(30, 41, 59, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
        }

        .comment-author {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .comment-text {
            font-size: 0.95rem;
            color: #e2e8f0;
            line-height: 1.5;
        }

        /* 공동 스크롤바 디자인 */
        .message-display::-webkit-scrollbar,
        .comment-list::-webkit-scrollbar {
            width: 6px;
        }
        .message-display::-webkit-scrollbar-thumb,
        .comment-list::-webkit-scrollbar-thumb {
            background-color: #3b82f6;
            border-radius: 4px;
        }

        /* 유튜브 플레이어 화면 숨김 처리 */
        .hidden-player {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="ui-control">
            <button id="start-bgm" class="play-btn">🎵 편지 읽기 (노래 재생)</button>
        </div>

        <div class="message-display">안녕하세요, 이 페이지에 머물러주셔서 감사합니다.

이곳은 제가 직접 작성한 글을 읽는 공간입니다.
상단의 버튼을 누르면 아이리 칸나의 '최종화'가 배경음악으로 흐르며,
음악을 트는 순간 버튼은 깔끔하게 사라지게 됩니다.

아래에는 파이어베이스 데이터베이스와 연동된 실시간 익명 방명록이 준비되어 있습니다.</div>

        <div class="comment-section">
            <h3>방명록 (익명 댓글)</h3>
            <div class="comment-form">
                <input type="text" id="comment-text" class="comment-input" placeholder="익명으로 따뜻한 한마디를 남겨보세요..." maxlength="200">
                <button id="submit-btn" class="comment-submit">등록</button>
            </div>
            
            <div id="comment-list" class="comment-list"></div>
        </div>
    </div>

    <div id="yt-player" class="hidden-player"></div>

    <script>
        // 1. 유튜브 설정 (아이리 칸나 - 최종화)
        var kannaVideoId = 'ajDAmJYPQ-U'; 

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                videoId: kannaVideoId,
                playerVars: {
                    'autoplay': 0,      
                    'controls': 0,      
                    'loop': 1,          
                    'playlist': kannaVideoId 
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            document.getElementById('start-bgm').addEventListener('click', function() {
                player.unMute();
                player.playVideo();
                
                var ui = document.getElementById('ui-control');
                ui.style.opacity = '0';
                setTimeout(function() {
                    ui.style.display = 'none';
                }, 500); 
            });
        }

        // 2. 🔥 [필수 설정] 파이어베이스 연결 설정 정보
        const firebaseConfig = {
          apiKey: "AIzaSyBKmo57nKqIpRQvoPOUFtYHXZE2IpcHzbY",
          authDomain: "website-32a82.firebaseapp.com",
          databaseURL: "https://website-32a82-default-rtdb.firebaseio.com",
          projectId: "website-32a82",
          storageBucket: "website-32a82.firebasestorage.app",
          messagingSenderId: "51412253738",
          appId: "1:51412253738:web:018218156cc35b11869753",
          measurementId: "G-M6ND09X25Q"

        };
        
        // 파이어베이스 초기화
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 3. 💬 DB에서 댓글 실시간으로 불러와 화면에 뿌리기
        database.ref('comments').orderByChild('timestamp').on('child_added', function(snapshot) {
            const data = snapshot.val();
            
            var newComment = document.createElement('div');
            newComment.className = 'comment-item';
            
            const date = new Date(data.timestamp).toLocaleString('ko-KR', { hour12: true, month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });
            const safeText = data.text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

            newComment.innerHTML = `
                <div class="comment-author">익명의 방문자 · ${date}</div>
                <div class="comment-text">${safeText}</div>
            `;
            
            var list = document.getElementById('comment-list');
            list.insertBefore(newComment, list.firstChild); 
        });

        // 4. 💬 등록 버튼을 누르면 DB로 댓글 전송 (수정된 핵심 로직)
        document.getElementById('submit-btn').addEventListener('click', function() {
            var input = document.getElementById('comment-text');
            var button = document.getElementById('submit-btn');
            var text = input.value.trim();
            
            if(text === "") {
                alert("내용을 입력해주세요.");
                return;
            }

            // [변경점] 파이어베이스 서버에 저장이 완전히 "완료된 시점(콜백)"을 캐치합니다.
            database.ref('comments').push({
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }, function(error) {
                if (error) {
                    alert("전송에 실패했습니다. 다시 시도해주세요.");
                } else {
                    // 1. 성공적으로 서버에 보내지면 기존에 썼던 글을 지웁니다.
                    input.value = ""; 

                    // 2. 버튼을 초록색 성공 상태로 변경하여 시각적 피드백을 제공합니다.
                    button.innerText = "✅ 완료";
                    button.style.backgroundColor = "#10b981"; 
                    button.style.borderColor = "#10b981";
                    button.style.color = "#ffffff";
                    button.disabled = true; // 연타 방지

                    // 3. 1.5초 후에 버튼을 원래 디자인으로 되돌립니다.
                    setTimeout(function() {
                        button.innerText = "등록";
                        button.style.backgroundColor = "#1e293b";
                        button.style.borderColor = "rgba(96, 165, 250, 0.3)";
                        button.style.color = "#93c5fd";
                        button.disabled = false;
                    }, 1500);
                }
            });
        });
    </script>
</body>
</html>
