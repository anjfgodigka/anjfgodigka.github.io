<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뭘해야함 </title>
    <style>
        /* 칸나 테마의 딥 블루&다크 배경 */
        body {
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: #f8fafc;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 메인 카드 컨테이너 */
        .container {
            max-width: 800px; 
            width: 100%;
            text-align: center;
            background: rgba(30, 41, 59, 0.4);
            padding: 40px; 
            border-radius: 24px;
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(96, 165, 250, 0.2);
        }

        /* 재생 버튼 컨테이너 (상단 배치 및 여백 설정) */
        #ui-control {
            transition: opacity 0.5s ease;
            margin-bottom: 30px; /* 버튼과 메시지 상자 사이의 간격 */
        }

        .play-btn {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 16px 40px; 
            font-size: 1.1rem; 
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
            transition: all 0.3s ease;
        }

        .play-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(37, 99, 235, 0.6);
        }

        /* 📝 내가 적은 글을 보여주는 읽기 전용 상자 */
        .message-display {
            width: 100%;
            min-height: 400px; 
            max-height: 600px; 
            overflow-y: auto; 
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: 12px;
            color: #cbd5e1;
            padding: 30px; 
            font-size: 1.2rem; 
            line-height: 2.0; 
            box-sizing: border-box;
            text-align: left;      
            white-space: pre-wrap; 
        }

        /* 스크롤바 디자인 (딥블루 테마) */
        .message-display::-webkit-scrollbar {
            width: 6px;
        }
        .message-display::-webkit-scrollbar-thumb {
            background-color: #3b82f6;
            border-radius: 4px;
        }

        /* 유튜브 플레이어 화면 숨김 처리 */
        .hidden-player {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="ui-control">
            <button id="start-bgm" class="play-btn">🎵(노래 재생)</button>
        </div>

        <div class="message-display">안녕하세요, 이 페이지에 머물러주셔서 감사합니다.

이곳은 제가 직접 작성한 글을 읽는 공간입니다.
상단의 버튼을 누르면 아이리 칸나의 '최종화'가 배경음악으로 흐르며,
음악을 트는 순간 버튼은 깔끔하게 사라지게 됩니다.

여기에 당신의 소중한 이야기나 전하고 싶은 말을 채워보세요.

(버튼이 상단으로 이동한 최종 수정 버전입니다.)
        
        
        
        
        
        
        
        
        
        
        
        
ㅏ나아ㅏ아ㅏㅏㅏㅏㅏㅏㅏㅏㅏㅏㅏ
    
        
        
        
        
        
        
        
        
        이야야ㅑㅑㅑㅑㅑㅑㅑㅑ</div>
    </div>

    <div id="yt-player" class="hidden-player"></div>

    <script>
        var kannaVideoId = 'ajDAmJYPQ-U'; 

        // 1. YouTube Iframe API 로드
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                videoId: kannaVideoId,
                playerVars: {
                    'autoplay': 0,      
                    'controls': 0,      
                    'loop': 1,          
                    'playlist': kannaVideoId 
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            document.getElementById('start-bgm').addEventListener('click', function() {
                player.unMute();
                player.playVideo();
                
                // 버튼 UI를 부드럽게 사라지게 한 뒤 공간 삭제
                var ui = document.getElementById('ui-control');
                ui.style.opacity = '0';
                setTimeout(function() {
                    ui.style.display = 'none';
                }, 500); 
            });
        }
    </script>
</body>
</html>
